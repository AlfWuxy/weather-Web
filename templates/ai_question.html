{% extends "base.html" %}

{% block title %}AI 助手 · 宜老天气通{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body text-center py-5">
                    <i class="bi bi-chat-dots display-5 text-primary"></i>
                    <h3 class="mt-3">随时询问天气和行动建议</h3>
                    <p class="text-muted mb-4">点击 AI 助手，可查询天气信息和通用行动建议。身体明显不适时请及时就医。</p>
                    <button class="btn btn-primary" id="openAiChat">
                        <i class="bi bi-robot"></i> 打开AI助手
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

{% block extra_js %}
<script>
document.getElementById('openAiChat').addEventListener('click', function() {
    if (window.AIChat && typeof window.AIChat.open === 'function') {
        window.AIChat.open();
    }
});
</script>
{% endblock %}
{% endblock %}
